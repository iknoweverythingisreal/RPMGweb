# DataSource
spring.datasource.url=jdbc:postgresql://localhost:5432/rpmedia_db
spring.datasource.username=postgres
spring.datasource.password=rpmedia
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.repair-on-migrate=true
spring.flyway.validate-on-migrate=false
# ถ้าฐานเดิมมีตารางอยู่แล้วจาก ddl-auto=update ให้เปิดบรรทัดนี้ครั้งแรกเท่านั้น แล้วค่อยปิดทีหลัง
# spring.flyway.baseline-on-migrate=true

# CSV import (คัสตอมของเรา)
inventory.import.enabled=false
inventory.import.path=./inventory

# JWT Configuration
jwt.secret=MySecretKeyForJWTTokenGenerationAndValidation2024
jwt.expiration=86400000

