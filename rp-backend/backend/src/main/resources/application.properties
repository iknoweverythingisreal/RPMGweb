# DataSource — overridable per host via environment variables
# (set DB_URL / DB_USERNAME / DB_PASSWORD on the server; falls back to local dev values)
spring.datasource.url=${DB_URL:jdbc:postgresql://db:5432/rpmedia_db}
spring.datasource.username=${DB_USERNAME:accpro_user}
spring.datasource.password=${DB_PASSWORD:Accpro_Pg!2026}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Flyway
spring.flyway.enabled=true
# Flyway Migration (Isolate for shared DB)
spring.flyway.table=flyway_schema_history_rpmedia
spring.flyway.baseline-on-migrate=true
spring.flyway.repair-on-migrate=true
spring.flyway.validate-on-migrate=false
# ถ้าฐานเดิมมีตารางอยู่แล้วจาก ddl-auto=update ให้เปิดบรรทัดนี้ครั้งแรกเท่านั้น แล้วค่อยปิดทีหลัง
# spring.flyway.baseline-on-migrate=true

# CSV import (คัสตอมของเรา)
inventory.import.enabled=false
inventory.import.path=./inventory

# Secrets live in secrets.properties (gitignored) or environment variables —
# see secrets.properties.example
spring.config.import=optional:classpath:secrets.properties

# JWT Configuration — override JWT_SECRET in production!
jwt.secret=${JWT_SECRET:YOUR_JWT_SECRET_HERE_CHANGE_ME}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Teamup Integration (set in secrets.properties or env)
teamup.api.key=${TEAMUP_API_KEY:}
teamup.calendar.key=${TEAMUP_CALENDAR_KEY:}
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
