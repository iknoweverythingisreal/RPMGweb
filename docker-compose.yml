version: "3.8"

# RPMedia — full stack in two containers.
#   1. cp .env.example .env   แล้วกรอกค่าจริง
#   2. docker compose up -d --build
#   3. เปิด http://<server-ip>  (frontend proxies /api → backend อัตโนมัติ)

services:
  rpmedia-backend:
    image: ghcr.io/iknoweverythingisreal/rpmgweb:latest
    container_name: rpmedia-backend
    restart: unless-stopped
    ports:
      - "80:8080"
    environment:
      # Spring reads these natively
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: ${DB_URL}
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      TEAMUP_API_KEY: ${TEAMUP_API_KEY:-}
      TEAMUP_CALENDAR_KEY: ${TEAMUP_CALENDAR_KEY:-}
      # Performance and logs
      SPRING_JPA_SHOW_SQL: "false"
      JAVA_OPTS: "-Xmx512m -Xms256m"
    deploy:
      resources:
        limits:
          memory: 768M
