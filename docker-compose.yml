version: "3.8"

# RPMedia — full stack in two containers.
#   1. cp .env.example .env   แล้วกรอกค่าจริง
#   2. docker compose up -d --build
#   3. เปิด http://<server-ip>  (frontend proxies /api → backend อัตโนมัติ)

services:
  backend:
    build: ./rp-backend/backend
    container_name: backend
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/accpro_db?sslmode=disable
      SPRING_DATASOURCE_USERNAME: accpro_user
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      TEAMUP_API_KEY: ${TEAMUP_API_KEY:-}
      TEAMUP_CALENDAR_KEY: ${TEAMUP_CALENDAR_KEY:-}
      SPRING_JPA_SHOW_SQL: 'false'
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_FLYWAY_ENABLED: 'false'
      JAVA_OPTS: '-Xmx512m -Xms256m'
    depends_on:
      - db
    ports:
      - '127.0.0.1:8080:8080'

  frontend:
    build: ./rp-frontend
    container_name: rp-frontend
    restart: unless-stopped
    ports:
      - '80:80'
    depends_on:
      - backend

  db:
    image: postgres:16-alpine
    container_name: accpro-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: accpro_db
      POSTGRES_USER: accpro_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
